<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGA Worldview Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #020617;
            background-image: 
                radial-gradient(at 0% 0%, hsla(192,83%,8%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(210,83%,12%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(202,83%,8%,1) 0, transparent 50%);
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .accent-glow {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-4xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                    PGA 万象世界观控制台
                </h1>
                <p class="text-slate-400 mt-2">万象星际协议体 - 核心设定管理系统</p>
            </div>
            <nav class="flex gap-4">
                <button onclick="switchTab('archive')" class="tab-btn active px-4 py-2 rounded-xl text-sm font-medium transition-all">文献档案库</button>
                <button onclick="switchTab('agent')" class="tab-btn px-4 py-2 rounded-xl text-sm font-medium transition-all">Agent 工作区</button>
                <button onclick="switchTab('entity-drafts')" class="tab-btn px-4 py-2 rounded-xl text-sm font-medium transition-all flex items-center gap-1">
                    实体草案 <span id="draft-count-badge" class="hidden bg-red-500 text-[10px] px-1.5 py-0.5 rounded-full">0</span>
                </button>
                <button onclick="switchTab('template')" class="tab-btn px-4 py-2 rounded-xl text-sm font-medium transition-all">模板管理</button>
            </nav>

        </header>

        <!-- Archive View (Default) -->
        <div id="archive-view" class="tab-view space-y-8">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass p-6 rounded-3xl group hover:border-cyan-500/30 transition-all cursor-pointer">
                    <div class="flex items-center gap-4">
                        <div class="p-3 rounded-2xl bg-cyan-500/10 text-cyan-400"><i data-lucide="database"></i></div>
                        <div>
                            <div class="text-xs text-slate-500">已入库设定条目</div>
                            <div id="count-docs" class="text-2xl font-semibold">--</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Sidebar: Categories & Search -->
                <div class="space-y-6">
                    <div class="glass p-6 rounded-3xl space-y-4">
                        <h2 class="text-lg font-semibold flex items-center gap-2">
                            <i data-lucide="search" class="w-5 h-5 text-cyan-400"></i>
                            知识检索
                        </h2>
                        <input type="text" id="search-input" placeholder="输入星区、种族或物理能量..." 
                            class="w-full bg-slate-900/50 border border-slate-700/50 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all">
                        <button id="search-btn" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-semibold py-3 rounded-2xl transition-all accent-glow">
                            立即搜索
                        </button>
                    </div>

                    <div class="glass p-6 rounded-3xl space-y-4 overflow-hidden">
                        <div class="flex items-center justify-between">
                            <h2 class="text-lg font-semibold flex items-center gap-2">
                                <i data-lucide="layers" class="w-5 h-5 text-blue-400"></i>
                                创作资产库 (Assets)
                            </h2>
                            <button onclick="fetchLore()" class="text-slate-500 hover:text-cyan-400 p-1 rounded-lg transition-all">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                            </button>
                        </div>
                        
                        <!-- Filter Tabs -->
                        <div class="flex gap-1 p-1 bg-black/40 rounded-xl border border-slate-800 text-[10px] font-bold">
                            <button onclick="setFilter('all')" id="filter-all" class="filter-btn active flex-1 py-1.5 px-2 rounded-lg bg-slate-800 text-slate-200">全部</button>
                            <button onclick="setFilter('Worldview')" id="filter-worldview" class="filter-btn flex-1 py-1.5 px-2 rounded-lg text-slate-500 hover:text-slate-300">设定</button>
                            <button onclick="setFilter('Outline')" id="filter-outline" class="filter-btn flex-1 py-1.5 px-2 rounded-lg text-slate-500 hover:text-slate-300">大纲</button>
                            <button onclick="setFilter('Prose')" id="filter-prose" class="filter-btn flex-1 py-1.5 px-2 rounded-lg text-slate-500 hover:text-slate-300">正文</button>
                        </div>

                        <div id="log-list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2 scrollbar-hide">
                            <!-- Logs inject here -->
                        </div>
                    </div>
                </div>

                <!-- Content Area -->
                <div class="lg:col-span-2 space-y-6">
                    <div id="main-content" class="glass p-8 rounded-[40px] min-h-[600px] relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-8 opacity-10"><i data-lucide="globe" class="w-32 h-32"></i></div>
                        
                        <div id="welcome-view">
                            <h3 class="text-2xl font-bold mb-4">欢迎访问 PGA 文献档案库</h3>
                            <p class="text-slate-400 leading-relaxed">
                                请从左侧记录中选择设定条目，或使用搜索功能查找特定的星区、种族及其运行机制。
                                Agent 审核逻辑会确保所有新增设定严格遵循**热力学定律**与**能量守恒定律**。
                            </p>
                        </div>

                        <div id="detail-view" class="hidden space-y-6">
                            <button onclick="showWelcome()" class="text-cyan-400 hover:text-cyan-300 text-sm flex items-center gap-1 mb-4">
                                <i data-lucide="arrow-left" class="w-4 h-4"></i> 返回档案库
                            </button>
                            <h3 id="detail-title" class="text-3xl font-bold text-white"></h3>
                            <div id="detail-content" class="prose prose-invert max-w-none text-slate-300 leading-relaxed whitespace-pre-wrap"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Agent View -->
        <div id="agent-view" class="tab-view hidden space-y-8">
            <div class="glass p-8 rounded-[40px] space-y-6">
                <!-- Agent Type Tabs -->
                <div class="flex gap-2">
                    <button id="btn-agent-worldview" onclick="setAgentType('worldview')" class="agent-tab-btn active bg-cyan-600 text-white px-4 py-2 rounded-xl text-sm font-medium transition-all">世界观 Agent</button>
                    <button id="btn-agent-outline" onclick="setAgentType('outline')" class="agent-tab-btn text-slate-400 hover:text-slate-200 px-4 py-2 rounded-xl text-sm font-medium transition-all">大纲 Agent</button>
                    <button id="btn-agent-writing" onclick="setAgentType('writing')" class="agent-tab-btn text-slate-400 hover:text-slate-200 px-4 py-2 rounded-xl text-sm font-medium transition-all">执笔 Agent</button>
                </div>

                <!-- Input Area -->
                <div class="space-y-2">
                    <label id="agent-input-label" class="text-xs text-slate-400 flex items-center gap-1">
                        <i data-lucide="globe" class="w-4 h-4"></i> 输入您的设定草案或指令
                    </label>
                    <textarea id="agent-input" rows="4" placeholder="例如：增加一个位于室女座超星系团边缘的智械母舰设定..."
                        class="w-full bg-slate-900/50 border border-slate-700/50 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all resize-none"></textarea>
                </div>

                <!-- Action Bar -->
                <div class="flex gap-4 items-center">
                    <button id="agent-run-btn" class="flex-1 bg-cyan-600 hover:opacity-90 text-white font-bold py-4 rounded-2xl transition-all shadow-lg">启动 PGA</button>
                    <span id="agent-status" class="text-xs text-slate-500">就绪</span>
                </div>

                <!-- Output Area -->
                <div id="agent-output" class="min-h-[200px] bg-black/20 rounded-3xl p-6 border border-slate-800">
                    <div class="text-slate-500 text-sm italic">Agent 输出将在此显示...</div>
                </div>

                <!-- Interaction: Feedback & Approve -->
                <div id="agent-interaction" class="hidden space-y-4 bg-slate-900/50 p-6 rounded-3xl border border-slate-800">
                    <div class="text-xs text-slate-500 uppercase tracking-widest">迭代反馈区</div>
                    <textarea id="agent-feedback" rows="2" placeholder="输入修改意见..."
                        class="w-full bg-black/30 border border-slate-700/50 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500 transition-all resize-none"></textarea>
                    <div class="flex gap-3">
                        <button id="agent-feedback-btn" class="flex-1 bg-amber-600 hover:bg-amber-500 text-white font-semibold py-3 rounded-xl transition-all">提交修改意见</button>
                        <button id="agent-approve-btn" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 rounded-xl transition-all">批准并持久化</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Entity Drafts View -->
        <div id="entity-drafts-view" class="tab-view hidden space-y-8">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="p-2 rounded-lg bg-orange-500 text-white shadow-lg shadow-orange-500/50"><i data-lucide="shield-check"></i></div>
                    <h2 class="text-2xl font-bold">待审实体草案 (Entity Sentinel)</h2>
                </div>
                <button onclick="fetchDrafts()" class="p-2 text-slate-400 hover:text-white transition-all">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>

            <div id="drafts-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Drafts inject here -->
                <div class="col-span-full text-center py-20 text-slate-500 italic">正在加载草案...</div>
            </div>
        </div>

            <div id="template-view" class="tab-view hidden space-y-8">
                <div class="flex items-center gap-3 mb-8">
                    <div class="p-2 rounded-lg bg-indigo-500 text-white shadow-lg shadow-indigo-500/50"><i data-lucide="layout"></i></div>
                    <h2 class="text-2xl font-bold">世界观分类模板管理</h2>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 h-[600px]">
                    <!-- Left: Category List -->
                    <div class="glass rounded-3xl p-6 space-y-4 overflow-hidden flex flex-col">
                        <div class="flex items-center justify-between">
                            <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                <i data-lucide="list" class="w-4 h-4"></i> 分类列表
                            </h3>
                            <button onclick="showNewCategoryModal()" class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded-lg font-semibold transition-all">
                                + 新建
                            </button>
                        </div>
                        <div id="template-categories" class="flex-1 space-y-2 overflow-y-auto pr-2 scrollbar-hide">
                            <!-- Categories inject here -->
                        </div>
                    </div>

                    <!-- Right: Template Editor -->
                    <div class="lg:col-span-2 glass rounded-[40px] p-8 flex flex-col gap-6 relative overflow-hidden">
                        <div class="flex items-center justify-between">
                            <h3 id="current-template-category" class="text-xl font-bold text-white">请选择一个分类</h3>
                            <div class="flex gap-2">
                                <button id="delete-template-btn" class="hidden bg-red-600/80 hover:bg-red-500 text-white px-4 py-2 rounded-xl font-semibold transition-all text-sm">
                                    删除分类
                                </button>
                                <button id="save-template-btn" class="hidden bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-xl font-semibold transition-all shadow-lg shadow-indigo-600/20">
                                    保存模板
                                </button>
                            </div>
                        </div>
                        
                        <div class="flex-1 flex flex-col gap-4">
                            <div class="text-xs text-slate-500 flex justify-between">
                                <span>JSON 架构与参考示例</span>
                                <span id="template-status" class="text-indigo-400">只读模式</span>
                            </div>
                            <textarea id="template-editor" readonly
                                class="flex-1 bg-black/40 border border-slate-800 rounded-3xl p-6 font-mono text-xs leading-relaxed focus:outline-none focus:border-indigo-500 transition-all resize-none scrollbar-hide"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <!-- New Category Modal -->
            <div id="new-category-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div class="glass rounded-3xl p-8 w-full max-w-lg space-y-6">
                    <h3 class="text-xl font-bold text-white flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-5 h-5 text-indigo-400"></i> 新建分类模板
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs text-slate-400 mb-1 block">分类标识 (English, 小写)</label>
                            <input id="new-cat-id" type="text" placeholder="例如: weapon" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 transition-all">
                        </div>
                        <div>
                            <label class="text-xs text-slate-400 mb-1 block">中文名称</label>
                            <input id="new-cat-name" type="text" placeholder="例如: 武器" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 transition-all">
                        </div>
                        <div>
                            <label class="text-xs text-slate-400 mb-1 block">初始模板字段 (JSON, 可选)</label>
                            <textarea id="new-cat-template" rows="4" placeholder='{"name": "[名称]", "type": "[类型]"}' class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-3 text-sm font-mono focus:outline-none focus:border-indigo-500 transition-all resize-none"></textarea>
                        </div>
                    </div>
                    <div class="flex gap-3 justify-end">
                        <button onclick="hideNewCategoryModal()" class="px-6 py-2 rounded-xl text-slate-400 hover:text-white transition-all">取消</button>
                        <button onclick="createNewCategory()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-xl font-semibold transition-all">创建</button>
                    </div>
                </div>
            </div>

            <!-- Edit Archive Modal -->
            <div id="edit-archive-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div class="glass rounded-3xl p-8 w-full max-w-2xl space-y-6">
                    <h3 class="text-xl font-bold text-white flex items-center gap-2">
                        <i data-lucide="edit-3" class="w-5 h-5 text-cyan-400"></i> 编辑档案条目
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs text-slate-400 mb-1 block">条目名称</label>
                            <input type="text" id="edit-archive-name" readonly
                                class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-3 text-sm text-slate-400">
                        </div>
                        <div>
                            <label class="text-xs text-slate-400 mb-1 block">原始内容 (支持 JSON 或 Markdown)</label>
                            <textarea id="edit-archive-content" rows="12" 
                                class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-cyan-500 transition-all resize-none font-mono"></textarea>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="closeEditArchiveModal()" class="flex-1 px-6 py-3 rounded-xl border border-slate-700 text-slate-400 hover:bg-slate-800 transition-all">取消</button>
                        <button id="save-archive-edit-btn" onclick="saveArchiveUpdate()" class="flex-1 bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-cyan-600/20">保存修改</button>
                    </div>
                </div>
            </div>

        </div>
    </div>


    <script>
        // Tab Management
        function switchTab(tabId) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'bg-cyan-600', 'text-white'));
            
            document.getElementById(`${tabId}-view`).classList.remove('hidden');
            const activeBtn = Array.from(document.querySelectorAll('.tab-btn'))
                .find(b => b.getAttribute('onclick').includes(tabId));
            if (activeBtn) {
                activeBtn.classList.add('active', 'bg-cyan-600', 'text-white');
            }

            if (tabId === 'entity-drafts') {
                fetchDrafts();
            }
        }

        const logList = document.getElementById('log-list');
        const detailView = document.getElementById('detail-view');
        const welcomeView = document.getElementById('welcome-view');
        const detailTitle = document.getElementById('detail-title');
        const detailContent = document.getElementById('detail-content');
        const countDocs = document.getElementById('count-docs');

        let allLoreData = [];
        let currentFilter = 'all';

        async function fetchLore() {
            try {
                const res = await fetch('/api/lore?t=' + Date.now());
                allLoreData = await res.json();
                if(countDocs) countDocs.innerText = allLoreData.length;
                renderLogs();
            } catch (err) {
                console.error("API error:", err);
            }
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('active', 'bg-slate-800', 'text-slate-200');
                b.classList.add('text-slate-500');
            });
            const btn = document.getElementById(`filter-${filter.toLowerCase()}`);
            if (btn) {
                btn.classList.add('active', 'bg-slate-800', 'text-slate-200');
                btn.classList.remove('text-slate-500');
            }
            renderLogs();
        }

        function renderLogs() {
            const data = allLoreData.filter(item => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'Worldview') {
                    return item.category !== 'Outline' && item.category !== 'Prose';
                }
                return item.category === currentFilter;
            });

            logList.innerHTML = data.map((item, index) => {
                let color = 'cyan';
                if (item.category === 'Outline') color = 'emerald';
                if (item.category === 'Prose' || item.category === 'Snapshot') color = 'purple';
                
                return `
                    <div class="relative group">
                        <div onclick="showDetailByIndex(${allLoreData.indexOf(item)})" 
                            class="p-4 rounded-2xl bg-slate-800/20 border border-slate-800 hover:border-${color}-500/40 hover:bg-slate-800/50 transition-all cursor-pointer text-left">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-[9px] text-${color}-400 font-bold uppercase tracking-wider bg-${color}-500/10 px-1.5 py-0.5 rounded">${item.category || 'General'}</span>
                                <span class="text-[9px] text-slate-600 font-mono">${item.timestamp}</span>
                            </div>
                            <div class="text-sm font-semibold group-hover:text-${color}-400 transition-colors line-clamp-2">${item.name || item.query}</div>
                        </div>
                        <button onclick="event.stopPropagation(); openEditArchiveModal(${allLoreData.indexOf(item)})" 
                            title="修改本条目"
                            class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 p-1.5 bg-slate-700 hover:bg-cyan-600 rounded-lg text-white transition-all">
                            <i data-lucide="edit-3" class="w-3 h-3"></i>
                        </button>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function showDetailByIndex(index) {
            const item = allLoreData[index];
            if (!item) return;
            showDetail(item.name || item.query, item.content);
        }

        function showDetail(title, content) {
            detailTitle.innerText = title;
            detailContent.innerText = content;
            welcomeView.classList.add('hidden');
            detailView.classList.remove('hidden');
        }

        let currentEditingIndex = -1;

        function openEditArchiveModal(index) {
            const item = allLoreData[index];
            if (!item) return;
            currentEditingIndex = index;
            document.getElementById('edit-archive-name').value = item.name || item.query;
            document.getElementById('edit-archive-content').value = item.content;
            document.getElementById('edit-archive-modal').classList.remove('hidden');
        }

        function closeEditArchiveModal() {
            document.getElementById('edit-archive-modal').classList.add('hidden');
        }

        async function saveArchiveUpdate() {
            const item = allLoreData[currentEditingIndex];
            const newContent = document.getElementById('edit-archive-content').value;
            const btn = document.getElementById('save-archive-edit-btn');
            
            console.log("[DEBUG] saveArchiveUpdate - Data:", {
                id: item ? item.id : 'undefined',
                type: item ? item.type : 'undefined',
                content_len: newContent ? newContent.length : 0
            });

            if (!item || !item.id || !item.type) {
                let msg = "保存失败：条目元数据不完整 (Missing ID or Type)";
                if (item) {
                    msg += `\n调试信息:\n- ID: ${item.id}\n- Type: ${item.type}\n- Name: ${item.name}`;
                } else {
                    msg += "\n错误：找不到对应的条目数据 (Item undefined)";
                }
                alert(msg);
                console.error("[ERROR] Missing metadata for item:", item);
                return;
            }

            btn.innerText = "保存中...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/archive/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: item.id,
                        type: item.type,
                        name: item.name || '',
                        content: newContent
                    })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    alert("保存成功！");
                    closeEditArchiveModal();
                    fetchLore(); 
                } else {
                    let errorMsg = data.error || "未知错误";
                    if (data.received) {
                        errorMsg += "\n调试信息: " + JSON.stringify(data.received);
                    }
                    alert("错误: " + errorMsg);
                    btn.innerText = "保存修改";

        async function runAgent() {
            const query = document.getElementById('agent-input').value;
            if (!query) return;

            current_thread_id = 'web_user_' + Date.now();
            const outputDiv = document.getElementById('agent-output');
            const statusSpan = document.getElementById('agent-status');
            
            statusSpan.innerText = "生成中...";
            outputDiv.innerHTML = `<div class="text-cyan-400 animate-pulse">正在进入 PGA 0-4 逻辑轨道 (${currentAgentType.toUpperCase()})...</div>`;

            try {
                const res = await fetch('/api/agent/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, thread_id: current_thread_id, agent_type: currentAgentType })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                renderAgentState(data);
            } catch (err) {
                outputDiv.innerHTML = `<div class="text-red-400 p-4 bg-red-500/10 border border-red-500/30 rounded-xl">错误: ${err.message}</div>`;
            } finally {

        async function submitFeedback(isApprove = false) {
            if (!current_thread_id) {
                alert("请先发起生成任务");
                return;
            }
            const feedbackInput = document.getElementById('agent-feedback');
            const feedback = isApprove ? "批准" : feedbackInput.value;
            if (!feedback && !isApprove) return;

            const statusSpan = document.getElementById('agent-status');
            statusSpan.innerText = isApprove ? "保存中..." : "打磨中...";

            try {
                const res = await fetch('/api/agent/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ feedback, thread_id: current_thread_id, agent_type: currentAgentType })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                
                if (isApprove && currentAgentType !== 'writing') {
                    alert("操作成功！数据已持久化。");
                    location.reload();
                } else if (isApprove && currentAgentType === 'writing') {
                    alert("当前场次已存档！正在进入下一环节。");
                    renderAgentState(data);
                    feedbackInput.value = '';
                } else {
                    renderAgentState(data);
                    feedbackInput.value = '';
                }
            } catch (err) {
                alert("操作失败: " + err.message);
            } finally {
                statusSpan.innerText = "就绪";
            }
        }

        async function approveDraft(name) {
            console.log("Approving draft:", name);
            if (!confirm(`确定批准并持久化实体 "${name}" 吗？`)) return;
            try {
                const res = await fetch('/api/entity-drafts/approve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ entity_name: name })
                });
                const data = await res.json();
                console.log("Approve response:", data);
                if (data.error) throw new Error(data.error);
                alert("批准成功！实体已正式入库。");
                fetchDrafts();
                fetchLore(); 
            } catch (err) {
                console.error("Approve error:", err);
                alert("操作失败: " + err.message);
            }
        }

        async function rejectDraft(name) {
            if (!confirm(`确定忽略实体 "${name}" 吗？该草案将被删除。`)) return;
            try {
                const res = await fetch('/api/entity-drafts/reject', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ entity_name: name })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                fetchDrafts();
            } catch (err) {
                alert("操作失败: " + err.message);
            }
        }

        async function createNewCategory() {
            const catId = document.getElementById('new-cat-id').value.trim().toLowerCase();
            const nameZh = document.getElementById('new-cat-name').value.trim();
            const templateRaw = document.getElementById('new-cat-template').value.trim();
            
            if (!catId || !nameZh) {
                alert('请输入分类标识和中文名称');
                return;
            }
            
            let templateFields = null;
            if (templateRaw) {
                try {
                    templateFields = JSON.parse(templateRaw);
                } catch (e) {
                    alert('初始模板 JSON 格式错误: ' + e.message);
                    return;
                }
            }
            
            try {
                const res = await fetch('/api/worldview/templates/new-category', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        category: catId,
                        name_zh: nameZh,
                        template: templateFields
                    })
                });
                const result = await res.json();
                if (result.error) throw new Error(result.error);
                
                hideNewCategoryModal();
                alert(`分类 '${catId}' (${nameZh}) 创建成功！`);
                await fetchTemplates();
                selectTemplate(catId);
            } catch (err) {
                alert('创建失败: ' + err.message);
            }
        }

        async function deleteCategory() {
            if (!selectedCategory) return;
            const nameZh = allTemplates[selectedCategory]?.name_zh || '';
            const label = nameZh ? `${selectedCategory} (${nameZh})` : selectedCategory;
            
            if (!confirm(`确定要删除分类 "${label}" 吗？此操作不可撤销。`)) return;
            
            try {
                const res = await fetch('/api/worldview/templates', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category: selectedCategory })
                });
                const result = await res.json();
                if (result.error) throw new Error(result.error);
                
                alert(`分类 '${label}' 已删除`);
                selectedCategory = null;
                document.getElementById('current-template-category').innerText = '请选择一个分类';
                document.getElementById('template-editor').value = '';
                document.getElementById('template-editor').readOnly = true;
                document.getElementById('save-template-btn').classList.add('hidden');
                document.getElementById('delete-template-btn').classList.add('hidden');
                document.getElementById('template-status').innerText = '只读模式';
                await fetchTemplates();
            } catch (err) {
                alert('删除失败: ' + err.message);
            }
        }


        async function saveTemplate() {
            if (!selectedCategory) return;
            
            const editor = document.getElementById('template-editor');
            const saveBtn = document.getElementById('save-template-btn');
            const status = document.getElementById('template-status');
            
            try {
                const templateData = JSON.parse(editor.value);
                saveBtn.disabled = true;
                saveBtn.innerText = "保存中...";
                
                const res = await fetch('/api/worldview/templates', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        category: selectedCategory,
                        template_data: templateData
                    })
                });
                
                const result = await res.json();
                if (result.error) throw new Error(result.error);
                
                alert(`模板 '${selectedCategory}' 更新成功！`);
                allTemplates[selectedCategory] = templateData;
                status.innerText = "保存完毕";
                setTimeout(() => {
                    status.innerText = "编辑模式";
                }, 2000);
            } catch (err) {
                alert("保存失败: " + err.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "保存模板";
            }
        }

        // --- Dashboard Initialization ---
        async function initDashboard() {
            console.log("[DASHBOARD] Starting initialization...");
            try {
                // 1. Initial Icon Render
                if (window.lucide) {
                    lucide.createIcons();
                    console.log("[DASHBOARD] Lucide icons created.");
                }

                // 2. Fetch Literature Archive
                console.log("[DASHBOARD] Fetching lore...");
                await fetchLore();
                console.log("[DASHBOARD] Lore fetch complete.");

                // 3. Pre-fetch Templates
                console.log("[DASHBOARD] Fetching templates...");
                await fetchTemplates();
                console.log("[DASHBOARD] Templates fetch complete.");

            } catch (err) {
                console.error("[DASHBOARD] Critical initialization error:", err);
            }
        }

        // Handle tab switching for templates specifically
        const originalSwitchTab = switchTab;
        window.switchTab = function(tabId) {
            console.log("[DASHBOARD] Switching to tab:", tabId);
            if (typeof originalSwitchTab === 'function') originalSwitchTab(tabId);
            if (tabId === 'template' && Object.keys(allTemplates).length === 0) {
                fetchTemplates();
            }
        };

        // Bind static elements
        const saveTemplateBtn = document.getElementById('save-template-btn');
        if (saveTemplateBtn) saveTemplateBtn.onclick = saveTemplate;
        const deleteTemplateBtn = document.getElementById('delete-template-btn');
        if (deleteTemplateBtn) deleteTemplateBtn.onclick = deleteCategory;

        // Start everything
        initDashboard();


    </script>

</body>
