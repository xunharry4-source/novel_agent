<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGA Worldview Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #020617;
            background-image: 
                radial-gradient(at 0% 0%, hsla(192,83%,8%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(210,83%,12%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(202,83%,8%,1) 0, transparent 50%);
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .accent-glow {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-4xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                    PGA 万象世界观控制台
                </h1>
                <p class="text-slate-400 mt-2">万象星际协议体 - 核心设定管理系统</p>
            </div>
            <nav class="flex gap-4">
                <button onclick="switchTab('archive')" class="tab-btn active px-4 py-2 rounded-xl text-sm font-medium transition-all">文献档案库</button>
                <button onclick="switchTab('agent')" class="tab-btn px-4 py-2 rounded-xl text-sm font-medium transition-all">Agent 工作区</button>
            </nav>
        </header>

        <!-- Archive View (Default) -->
        <div id="archive-view" class="tab-view space-y-8">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass p-6 rounded-3xl group hover:border-cyan-500/30 transition-all cursor-pointer">
                    <div class="flex items-center gap-4">
                        <div class="p-3 rounded-2xl bg-cyan-500/10 text-cyan-400"><i data-lucide="database"></i></div>
                        <div>
                            <div class="text-xs text-slate-500">已入库设定条目</div>
                            <div id="count-docs" class="text-2xl font-semibold">--</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Sidebar: Categories & Search -->
                <div class="space-y-6">
                    <div class="glass p-6 rounded-3xl space-y-4">
                        <h2 class="text-lg font-semibold flex items-center gap-2">
                            <i data-lucide="search" class="w-5 h-5 text-cyan-400"></i>
                            知识检索
                        </h2>
                        <input type="text" id="search-input" placeholder="输入星区、种族或物理能量..." 
                            class="w-full bg-slate-900/50 border border-slate-700/50 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all">
                        <button id="search-btn" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-semibold py-3 rounded-2xl transition-all accent-glow">
                            立即搜索
                        </button>
                    </div>

                    <div class="glass p-6 rounded-3xl space-y-4 overflow-hidden">
                        <div class="flex items-center justify-between">
                            <h2 class="text-lg font-semibold flex items-center gap-2">
                                <i data-lucide="layers" class="w-5 h-5 text-blue-400"></i>
                                创作资产库 (Assets)
                            </h2>
                            <button onclick="fetchLore()" class="text-slate-500 hover:text-cyan-400 p-1 rounded-lg transition-all">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                            </button>
                        </div>
                        
                        <!-- Filter Tabs -->
                        <div class="flex gap-1 p-1 bg-black/40 rounded-xl border border-slate-800 text-[10px] font-bold">
                            <button onclick="setFilter('all')" id="filter-all" class="filter-btn active flex-1 py-1.5 px-2 rounded-lg bg-slate-800 text-slate-200">全部</button>
                            <button onclick="setFilter('Worldview')" id="filter-worldview" class="filter-btn flex-1 py-1.5 px-2 rounded-lg text-slate-500 hover:text-slate-300">设定</button>
                            <button onclick="setFilter('Outline')" id="filter-outline" class="filter-btn flex-1 py-1.5 px-2 rounded-lg text-slate-500 hover:text-slate-300">大纲</button>
                            <button onclick="setFilter('Prose')" id="filter-prose" class="filter-btn flex-1 py-1.5 px-2 rounded-lg text-slate-500 hover:text-slate-300">正文</button>
                        </div>

                        <div id="log-list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2 scrollbar-hide">
                            <!-- Logs inject here -->
                        </div>
                    </div>
                </div>

                <!-- Content Area -->
                <div class="lg:col-span-2 space-y-6">
                    <div id="main-content" class="glass p-8 rounded-[40px] min-h-[600px] relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-8 opacity-10"><i data-lucide="globe" class="w-32 h-32"></i></div>
                        
                        <div id="welcome-view">
                            <h3 class="text-2xl font-bold mb-4">欢迎访问 PGA 文献档案库</h3>
                            <p class="text-slate-400 leading-relaxed">
                                请从左侧记录中选择设定条目，或使用搜索功能查找特定的星区、种族及其运行机制。
                                Agent 审核逻辑会确保所有新增设定严格遵循**热力学定律**与**能量守恒定律**。
                            </p>
                        </div>

                        <div id="detail-view" class="hidden space-y-6">
                            <button onclick="showWelcome()" class="text-cyan-400 hover:text-cyan-300 text-sm flex items-center gap-1 mb-4">
                                <i data-lucide="arrow-left" class="w-4 h-4"></i> 返回档案库
                            </button>
                            <h3 id="detail-title" class="text-3xl font-bold text-white"></h3>
                            <div id="detail-content" class="prose prose-invert max-w-none text-slate-300 leading-relaxed whitespace-pre-wrap"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Agent Workspace View -->
        <div id="agent-view" class="tab-view hidden space-y-8">
                <div class="flex flex-col lg:flex-row items-start lg:items-center justify-between gap-4 mb-8">
                    <div class="flex items-center gap-3">
                        <div class="p-2 rounded-lg bg-cyan-500 text-white shadow-lg shadow-cyan-500/50"><i data-lucide="zap"></i></div>
                        <h2 class="text-2xl font-bold">闭环迭代创作区</h2>
                    </div>
                    <!-- Agent Selector -->
                    <div class="flex items-center gap-2 bg-slate-900/50 p-1.5 rounded-2xl border border-slate-700/50">
                        <button onclick="setAgentType('worldview')" id="btn-agent-worldview" class="agent-tab-btn active px-4 py-2 rounded-xl text-xs font-semibold transition-all bg-cyan-600 text-white">
                            <i data-lucide="globe" class="w-3 h-3 inline-block mr-1"></i> 世界观增强
                        </button>
                        <button onclick="setAgentType('outline')" id="btn-agent-outline" class="agent-tab-btn px-4 py-2 rounded-xl text-xs font-semibold transition-all text-slate-400 hover:text-slate-200">
                            <i data-lucide="list" class="w-3 h-3 inline-block mr-1"></i> 大纲生成
                        </button>
                        <button onclick="setAgentType('writing')" id="btn-agent-writing" class="agent-tab-btn px-4 py-2 rounded-xl text-xs font-semibold transition-all text-slate-400 hover:text-slate-200">
                            <i data-lucide="pen-tool" class="w-3 h-3 inline-block mr-1"></i> 写作执行
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 h-[600px]">
                    <!-- Left: Input & Interaction -->
                    <div class="flex flex-col gap-4">
                        <div class="flex-1 flex flex-col gap-4">
                            <label id="agent-input-label" class="text-sm text-slate-400 flex items-center gap-2"><i data-lucide="message-square" class="w-4 h-4"></i> 输入您的设定草案或指令</label>
                            <textarea id="agent-input" placeholder="例如：增加一个位于室女座超星系团边缘的智械母舰设定..." 
                                class="flex-1 bg-slate-900/50 border border-slate-700/50 rounded-3xl p-6 text-sm focus:outline-none focus:border-cyan-500 transition-all resize-none"></textarea>
                        </div>
                        <div class="flex gap-4">
                            <button id="agent-run-btn" class="flex-1 bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-cyan-600/20">启动 Agent 生成</button>
                        </div>
                        
                        <div id="agent-interaction" class="hidden space-y-4 pt-4 border-t border-slate-700/50">
                            <input type="text" id="agent-feedback" placeholder="输入您的修改意见..." 
                                class="w-full bg-slate-800/50 border border-slate-700/50 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500">
                            <div class="flex gap-4">
                                <button id="agent-feedback-btn" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-2xl transition-all">提交反馈</button>
                                <button id="agent-approve-btn" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 rounded-2xl transition-all">批准入库</button>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Logic Visualization -->
                    <div class="flex flex-col gap-4 overflow-hidden">
                        <div class="flex items-center justify-between text-xs text-slate-500 px-2">
                            <span>实时逻辑流 (Thinking & Audit)</span>
                            <span id="agent-status" class="flex items-center gap-1 text-cyan-400">就绪</span>
                        </div>
                        <div id="agent-output" class="flex-1 bg-black/40 border border-slate-800 rounded-3xl p-6 overflow-y-auto space-y-6 font-mono text-xs leading-relaxed">
                            <div class="text-slate-500 italic">等待指令启动...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Tab Management
        function switchTab(tabId) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'bg-cyan-600', 'text-white'));
            
            document.getElementById(`${tabId}-view`).classList.remove('hidden');
            const activeBtn = Array.from(document.querySelectorAll('.tab-btn'))
                .find(b => b.onclick.toString().includes(tabId));
            if (activeBtn) {
                activeBtn.classList.add('active', 'bg-cyan-600', 'text-white');
            }
        }

        const logList = document.getElementById('log-list');
        const detailView = document.getElementById('detail-view');
        const welcomeView = document.getElementById('welcome-view');
        const detailTitle = document.getElementById('detail-title');
        const detailContent = document.getElementById('detail-content');
        const countDocs = document.getElementById('count-docs');

        let allLoreData = [];
        let currentFilter = 'all';

        async function fetchLore() {
            try {
                const res = await fetch('/api/lore');
                allLoreData = await res.json();
                if(countDocs) countDocs.innerText = allLoreData.length;
                renderLogs();
            } catch (err) {
                console.error("API error:", err);
            }
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('active', 'bg-slate-800', 'text-slate-200');
                b.classList.add('text-slate-500');
            });
            const btn = document.getElementById(`filter-${filter.toLowerCase()}`);
            if (btn) {
                btn.classList.add('active', 'bg-slate-800', 'text-slate-200');
                btn.classList.remove('text-slate-500');
            }
            renderLogs();
        }

        function renderLogs() {
            const data = currentFilter === 'all' 
                ? allLoreData 
                : allLoreData.filter(item => item.category === currentFilter);

            logList.innerHTML = data.map(item => {
                let color = 'cyan';
                if (item.category === 'Outline') color = 'emerald';
                if (item.category === 'Prose' || item.category === 'Snapshot') color = 'purple';
                
                return `
                    <div onclick="showDetail('${item.name || item.query}', \`${item.content.replace(/`/g, '\\`')}\`)" 
                        class="p-4 rounded-2xl bg-slate-800/20 border border-slate-800 hover:border-${color}-500/40 hover:bg-slate-800/50 transition-all cursor-pointer group text-left">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] text-${color}-400 font-bold uppercase tracking-wider bg-${color}-500/10 px-1.5 py-0.5 rounded">${item.category || 'General'}</span>
                            <span class="text-[9px] text-slate-600 font-mono">${item.timestamp}</span>
                        </div>
                        <div class="text-sm font-semibold group-hover:text-${color}-400 transition-colors line-clamp-2">${item.name || item.query}</div>
                    </div>
                `;
            }).join('');
        }

        function showDetail(title, content) {
            detailTitle.innerText = title;
            detailContent.innerText = content;
            welcomeView.classList.add('hidden');
            detailView.classList.remove('hidden');
        }

        function showWelcome() {
            welcomeView.classList.remove('hidden');
            detailView.classList.add('hidden');
        }

        // Agent Logic
        let current_thread_id = null;
        let currentAgentType = 'worldview';

        function setAgentType(type) {
            currentAgentType = type;
            document.querySelectorAll('.agent-tab-btn').forEach(b => {
                b.classList.remove('active', 'bg-cyan-600', 'bg-emerald-600', 'bg-purple-600', 'text-white');
                b.classList.add('text-slate-400', 'hover:text-slate-200');
            });
            
            const activeBtn = document.getElementById(`btn-agent-${type}`);
            const runBtn = document.getElementById('agent-run-btn');
            const statusIcon = document.getElementById('agent-status');
            
            if (activeBtn) {
                let colorClass = 'bg-cyan-600';
                if (type === 'outline') colorClass = 'bg-emerald-600';
                if (type === 'writing') colorClass = 'bg-purple-600';
                
                activeBtn.classList.add('active', colorClass, 'text-white');
                activeBtn.classList.remove('text-slate-400', 'hover:text-slate-200');
                
                // Update Run Button Color
                runBtn.className = `flex-1 ${colorClass} hover:opacity-90 text-white font-bold py-4 rounded-2xl transition-all shadow-lg`;
            }

            // Update UI context
            const label = document.getElementById('agent-input-label');
            const input = document.getElementById('agent-input');
            if (type === 'worldview') {
                label.innerHTML = '<i data-lucide="globe" class="w-4 h-4"></i> 输入您的设定草案或指令';
                input.placeholder = "例如：增加一个位于室女座超星系团边缘的智械母舰设定...";
            } else if (type === 'outline') {
                label.innerHTML = '<i data-lucide="list" class="w-4 h-4"></i> 输入您的小说大纲需求';
                input.placeholder = "例如：写一个关于底层智械在戴森球内部觉醒并反抗星际协议的短篇小说大纲...";
            } else {
                label.innerHTML = '<i data-lucide="pen-tool" class="w-4 h-4"></i> 输入大纲 ID 处理正文';
                input.placeholder = "输入已由 Outline Agent 生成并批准的 Outline ID (如: outline_1710...)";
            }
            lucide.createIcons();
        }

        async function runAgent() {
            const query = document.getElementById('agent-input').value;
            if (!query) return;

            current_thread_id = 'web_user_' + Date.now();
            const outputDiv = document.getElementById('agent-output');
            const statusSpan = document.getElementById('agent-status');
            
            statusSpan.innerText = "生成中...";
            outputDiv.innerHTML = `<div class="text-cyan-400 animate-pulse">正在进入 PGA 0-4 逻辑轨道 (${currentAgentType.toUpperCase()})...</div>`;

            try {
                const res = await fetch('/api/agent/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, thread_id: current_thread_id, agent_type: currentAgentType })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                renderAgentState(data);
            } catch (err) {
                outputDiv.innerHTML = `<div class="text-red-400 p-4 bg-red-500/10 border border-red-500/30 rounded-xl">错误: ${err.message}</div>`;
            } finally {
                statusSpan.innerText = "就绪";
            }
        }

        async function submitFeedback(isApprove = false) {
            if (!current_thread_id) {
                alert("请先发起生成任务");
                return;
            }
            const feedbackInput = document.getElementById('agent-feedback');
            const feedback = isApprove ? "批准" : feedbackInput.value;
            if (!feedback && !isApprove) return;

            const statusSpan = document.getElementById('agent-status');
            statusSpan.innerText = isApprove ? "保存中..." : "打磨中...";

            try {
                const res = await fetch('/api/agent/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ feedback, thread_id: current_thread_id, agent_type: currentAgentType })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                
                if (isApprove && currentAgentType !== 'writing') {
                    alert("操作成功！数据已持久化。");
                    location.reload();
                } else if (isApprove && currentAgentType === 'writing') {
                    alert("当前场次已存档！正在进入下一环节。");
                    renderAgentState(data);
                    feedbackInput.value = '';
                } else {
                    renderAgentState(data);
                    feedbackInput.value = '';
                }
            } catch (err) {
                alert("操作失败: " + err.message);
            } finally {
                statusSpan.innerText = "就绪";
            }
        }

        function renderAgentState(data) {
            const outputDiv = document.getElementById('agent-output');
            const interactionDiv = document.getElementById('agent-interaction');
            const statusSpan = document.getElementById('agent-status');
            
            if (data.status_message) {
                statusSpan.innerText = data.status_message;
            }

            let html = "";
            if (data.status_message) {
                html += `<div class="text-[10px] text-cyan-400/60 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-ping"></span>
                    当前进程: ${data.status_message}
                </div>`;
            }

            // Audit/Feedback Logs
            const auditLog = data.review_log || data.audit_feedback;
            if (auditLog) {
                const passed = data.is_approved || data.is_audit_passed;
                html += `<div class="bg-slate-900/50 p-4 rounded-2xl border ${passed ? 'border-emerald-500/30' : 'border-amber-500/30'} mb-4">
                    <div class="text-[10px] text-slate-500 uppercase tracking-widest mb-2">架构/逻辑审计报告</div>
                    <div class="text-[11px] ${passed ? 'text-emerald-400' : 'text-amber-400'} whitespace-pre-wrap">${auditLog}</div>
                </div>`;
            }
            
            if (data.proposal || data.draft_content) {
                let contentHtml = "";
                
                if (data.proposal && currentAgentType === 'outline') {
                    try {
                        const outline = typeof data.proposal === 'string' ? JSON.parse(data.proposal) : data.proposal;
                        contentHtml = `
                            <div class="space-y-4">
                                <div class="border-b border-slate-700 pb-2">
                                    <h4 class="text-cyan-400 font-bold text-lg">${outline.meta_info.title || '无标题'}</h4>
                                    <div class="flex gap-2 mt-1">
                                        ${outline.meta_info.genre.map(g => `<span class="px-2 py-0.5 bg-cyan-500/10 text-cyan-400 text-[10px] rounded-full">${g}</span>`).join('')}
                                        <span class="text-slate-500 text-[10px]">风格: ${outline.meta_info.writing_style}</span>
                                    </div>
                                </div>
                                <div class="space-y-2">
                                    <div class="text-xs text-slate-400 font-semibold uppercase">剧情节拍 (Plot Beats)</div>
                                    <div class="grid grid-cols-1 gap-2">
                                        ${Object.entries(outline.plot_beats).map(([key, value]) => `
                                            <div class="flex gap-3 bg-slate-800/20 p-2 rounded-lg">
                                                <div class="text-cyan-500 font-bold uppercase text-[10px] w-16">${key}</div>
                                                <div class="text-slate-300 text-[11px]">${value}</div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        `;
                    } catch (e) {
                         contentHtml = `<div class="text-[13px] text-slate-200 whitespace-pre-wrap">${data.proposal}</div>`;
                    }
                } else if (data.draft_content) {
                    contentHtml = `
                        <div class="space-y-4">
                             <div class="flex justify-between items-center bg-purple-500/10 p-2 rounded-lg border border-purple-500/20">
                                <span class="text-xs text-purple-400 font-bold tracking-widest uppercase">场次正文初稿</span>
                                <span class="text-[10px] text-slate-500 font-mono">SCENE INDEX: ${data.active_scene_index}</span>
                             </div>
                             <div class="text-[14px] text-slate-200 leading-relaxed font-serif p-4 bg-black/20 rounded-xl border border-slate-800 whitespace-pre-wrap">${data.draft_content}</div>
                        </div>
                    `;
                    
                    // Add Snapshots if available
                    if (data.char_status_summary || data.scene_status_summary) {
                        html += `
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                <div class="bg-indigo-500/10 p-4 rounded-2xl border border-indigo-500/30">
                                    <div class="text-[10px] text-indigo-400 uppercase tracking-widest mb-2 flex items-center gap-1">
                                        <i data-lucide="user" class="w-3 h-3"></i> 逻辑快照: 人物状态
                                    </div>
                                    <div class="text-[11px] text-slate-300 whitespace-pre-wrap">${data.char_status_summary}</div>
                                </div>
                                <div class="bg-blue-500/10 p-4 rounded-2xl border border-blue-500/30">
                                    <div class="text-[10px] text-blue-400 uppercase tracking-widest mb-2 flex items-center gap-1">
                                        <i data-lucide="map" class="w-3 h-3"></i> 逻辑快照: 场景环境
                                    </div>
                                    <div class="text-[11px] text-slate-300 whitespace-pre-wrap">${data.scene_status_summary}</div>
                                </div>
                            </div>
                        `;
                    }
                    
                    if (data.visual_snapshot_path) {
                        html += `
                            <div class="mb-4 bg-slate-900/80 rounded-2xl border border-slate-700 overflow-hidden">
                                <div class="text-[10px] text-slate-500 uppercase tracking-widest p-3 bg-slate-800/50 flex justify-between items-center">
                                    <span>视觉快照 (Illustration)</span>
                                    <span class="text-cyan-500">Nano Banana 2 Generated</span>
                                </div>
                                <div class="aspect-video bg-slate-800 flex items-center justify-center relative group">
                                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                                    <div class="text-slate-500 text-[10px] italic">视觉快照模拟：[${data.visual_snapshot_path}]</div>
                                    <!-- In real env, use <img src="${data.visual_snapshot_path}"> -->
                                    <div class="absolute bottom-4 left-4 right-4">
                                        <div class="text-[10px] text-white/80 line-clamp-2">${data.status_message}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                } else {
                    contentHtml = `<div class="text-[13px] text-slate-200 whitespace-pre-wrap">${data.proposal || data.query}</div>`;
                }

                html += `<div class="bg-slate-900/50 p-4 rounded-2xl border border-cyan-500/20">
                    <div class="text-[10px] text-slate-500 uppercase tracking-widest mb-2">PGA 生成产物</div>
                    ${contentHtml}
                </div>`;
            }

            outputDiv.innerHTML = html;
            interactionDiv.classList.remove('hidden');
            lucide.createIcons();
        }

        // Search logic
        document.getElementById('search-btn').onclick = async () => {
            const query = document.getElementById('search-input').value;
            if(!query) return;
            const res = await fetch('/api/search', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query})
            });
            const data = await res.json();
            renderLogs(data.map(d => ({
                name: d.metadata.name || '搜索结果',
                content: d.content,
                category: d.metadata.category || 'Search',
                timestamp: '刚刚'
            })));
        };

        // Event listeners
        document.getElementById('agent-run-btn').onclick = runAgent;
        document.getElementById('agent-feedback-btn').onclick = () => submitFeedback(false);
        document.getElementById('agent-approve-btn').onclick = () => submitFeedback(true);

        fetchLore();
        lucide.createIcons();
    </script>
</body>
</html>
